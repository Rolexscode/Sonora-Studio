<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Sonora Studio</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 40px; }
    .admin-form { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; background: var(--bg-surface); padding: 32px; border-radius: 8px; }
    .admin-form input, .admin-form select, .admin-form textarea { width: 100%; padding: 12px; background: var(--bg-app); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 4px; }
  </style>
</head>
<body class="theme-dark">
  <div class="container">
    <h1 style="text-align:center; margin-bottom: 24px;">Agregar Nuevo Producto</h1>
    <form class="admin-form" id="adminForm">
      <input type="text" id="name" placeholder="Nombre del Producto" required>
      <select id="category" required>
        <option value="guitarras">Guitarras</option>
        <option value="bajos">Bajos</option>
        <option value="teclados">Teclados</option>
        <option value="baterias">Baterías</option>
        <option value="estudio">Estudio</option>
        <option value="accesorios">Accesorios</option>
      </select>
      <input type="number" id="price" placeholder="Precio (S/)" step="0.01" required>
      <input type="number" id="rating" placeholder="Calificación (1.0 - 5.0)" step="0.1" max="5" min="1" required>
      <textarea id="desc" placeholder="Descripción corta" rows="3" required></textarea>
      <button type="submit" class="btn btn-primary">Guardar Producto en Base de Datos</button>
      <a href="index.html" class="btn btn-secondary" style="text-align:center; display:block;">Volver a la Tienda</a>
    </form>
  </div>
  <script>
    document.getElementById('adminForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const product = {
        name: document.getElementById('name').value,
        category: document.getElementById('category').value,
        price: parseFloat(document.getElementById('price').value),
        rating: parseFloat(document.getElementById('rating').value),
        desc: document.getElementById('desc').value,
        inStock: true,
        isNew: true,
        specs: { "Nuevo": "Sí" }
      };
      const res = await fetch('/api/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(product)
      });
      if(res.ok) {
        alert('¡Producto guardado exitosamente!');
        e.target.reset();
      } else {
        alert('Error al guardar.');
      }
    });
  </script>
</body>
</html>
